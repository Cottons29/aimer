name: Website backend image

on:
  push:
    branches: [main, master]
    paths:
      - "website_backend/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/**"
      - ".dockerignore"
      - ".github/workflows/website-backend-image.yml"
  pull_request:
    paths:
      - "website_backend/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/**"
      - ".dockerignore"
      - ".github/workflows/website-backend-image.yml"

concurrency:
  group: website-backend-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/cottons29/aimer-website-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: website_backend/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=website-backend
          cache-to: type=gha,mode=max,scope=website-backend

      - name: Deploy website backend
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1
        env:
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: PROJECT_PATH
          script: |
            set -eu
            cd "$PROJECT_PATH"
            podman-compose down
            podman-compose pull
            podman-compose up -d