server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # The wasm is compiled with +atomics (threads / SharedArrayBuffer). Browsers
    # only expose SharedArrayBuffer to *cross-origin-isolated* pages, which
    # requires these two headers on every response — without them the app fails
    # to start.
    add_header Cross-Origin-Opener-Policy   same-origin  always;
    add_header Cross-Origin-Embedder-Policy require-corp always;

    # Serve .wasm with the correct MIME type so the browser streaming-compiles it.
    location ~ \.wasm$ {
        default_type application/wasm;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ponytail: plain HTTP only. WebGPU needs a "secure context", which is
    # satisfied on localhost but NOT on a bare LAN IP — terminate TLS at a
    # reverse proxy (or map this behind one) when serving to other devices.
}
