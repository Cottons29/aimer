<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>Aimer's Website</title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <link data-trunk rel="copy-dir" href="assets"/>
    <link data-trunk rel="rust" href="../../Cargo.toml" data-wasm-opt="z"
          data-wasm-opt-params="--all-features"/>
</head>

<style>
    html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        /*background: #000;*/
    }

    /* The winit/wasm renderer creates the <canvas>, appends it to <body> and
       sets id="aimer_app" on it, so this rule styles that canvas. */
    #aimer_app {
        position: fixed;
        inset: 0;
        height: 100dvh;
        width: 100%;
        z-index: 1;
        outline: none;
        background: #000;
    }

    .loader {
        width: fit-content;
        font-weight: bold;
        font-family: monospace;
        white-space: pre;
        font-size: 30px;
        line-height: 1.2em;
        color: white;
        height: 1.2em;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        overflow: hidden;
        opacity: 1;
        /*transition: opacity 400ms ease;*/
    }

    .loader:before {
        content: "Loading...\A⌰oading...\A⌰⍜ading...\A⌰⍜⏃ding...\A⌰⍜⏃⎅ing...\A⌰⍜⏃⎅⟟ng...\A⌰⍜⏃⎅⟟⋏g...\A⌰⍜⏃⎅⟟⋏☌...\A⌰⍜⏃⎅⟟⋏☌⟒..\A⌰⍜⏃⎅⟟⋏☌⟒⏁.\A⌰⍜⏃⎅⟟⋏☌⟒⏁⋔";
        white-space: pre;
        display: inline-block;
        animation: l39 1s infinite steps(11) alternate;
    }

    @keyframes l39 {
        100% {
            transform: translateY(-100%);
        }
    }



    #loading-holder {
        width: 100dvw;
        height: 100dvh;
        position: fixed;
        z-index: 3;
        background: #212525;
        transition: opacity 360ms ease-out;
    }

    #loading-holder.hidden {
        opacity: 0;
        pointer-events: none;
    }
    
    @keyframes fade-out-opacity {
        0% {
            opacity: 1;
        }
        50% {
            opacity: 0.5;
        }
        100% {
            opacity: 0;
            display: none;
        }
    }

    @keyframes loader-text {
        100% {
            transform: translateY(-100%);
        }
    }
</style>
<body>
<div id="loading-holder">
    <div id="loader" class="loader"></div>
</div>

</body>
<script>

    // setTimeout(function () {
    //     const el = document.getElementById('loading-holder');
    //     if (!el) return;
    //     el.classList.add('hidden');
    // }, 520);

    function hideBoot() {
        const el = document.getElementById('loading-holder');
        if (!el) return;
        el.classList.add('hidden');
        setTimeout(function () {
            if (el.parentNode) el.parentNode.removeChild(el);
        }, 620);

    }

    window.addEventListener("aimer:first-frame-rendered", hideBoot, {once: true});
</script>
</html>
